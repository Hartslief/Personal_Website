# Deployment readiness check — manually triggered or on push/PR to main
name: Deployment Readiness Check

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to check'
        default: 'main'
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-build:
    name: Lint & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch || github.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Check TypeScript types
        run: npx tsc --noEmit

      - name: Build project
        run: npm run build

      - name: Deployment ready.
        run: echo "All checks passed. Project is ready for deployment."
